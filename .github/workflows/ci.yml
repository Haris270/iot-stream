name: go-simulator-ci


on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.24', '1.25', '1.26.x' ]
        
    steps:
      # Step 1: Pull the code onto the server
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Setup & Install Go using Matrix Versions
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      # Step 3: Download Go dependencies
      - name: Download Dependencies
        run: go mod download

      #Step 4: Compilation Verification
      - name: Build Go Project
        run: go build -v ./...


        

    
    
